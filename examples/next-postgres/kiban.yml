workspace: next-postgres
projects:
  - name: web
    path: ~/projects/web
    command: pnpm dev
    port: 3000
    url: http://localhost:3000
    services:
      - postgres
services:
  - name: postgres
    image: postgres:16
    ports:
      - "5432:5432"
    env:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    healthCheck:
      type: tcp
      host: 127.0.0.1
      port: 5432
